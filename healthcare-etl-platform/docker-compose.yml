version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: healthcare_db_container
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-healthcare_db}
      - POSTGRES_USER=${DB_USER:-healthcare_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-healthcare_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthcare_user} -d ${DB_NAME:-healthcare_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare_web_container
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./datasets:/app/datasets
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
