{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare ETL Platform</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

    {% block navbar %}
    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <span class="navbar-brand-icon">❤️</span> Healthcare Platform
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/etl/">ETL</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pacientes/">Pacientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ml/">Machine Learning</a>
                    </li>
                    <li class="nav-item" id="navReportes">
                        <a class="nav-link" href="/reportes/">Reportes</a>
                    </li>
                    <li class="nav-item" id="navUsuarios">
                        <a class="nav-link" href="/usuarios/">Usuarios</a>
                    </li>
                </ul>
                <span class="navbar-text me-3" id="userRolDisplay">
                    Cargando rol...
                </span>
                <button class="btn btn-outline-light btn-sm" style="border-radius: 8px;" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    {% endblock navbar %}

    <div class="container pb-5">
        {% block content %}
        {% endblock content %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Interceptor y Fetch wrapper
        const API_BASE = '/api';

        function getToken() {
            return localStorage.getItem('access_token');
        }

        function setToken(access, refresh) {
            localStorage.setItem('access_token', access);
            if (refresh) localStorage.setItem('refresh_token', refresh);
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('rol');
            window.location.href = '/login/';
        }

        // Wrapper para fetch que inyecta token y maneja 401/403
        async function fetchWithAuth(url, options = {}) {
            let token = getToken();
            
            if (!options.headers) {
                options.headers = {};
            }
            
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }

            let response = await fetch(url, options);

            if (response.status === 401 || response.status === 403) {
                // Si el token expira, intentar usar el refresh token
                const refresh = localStorage.getItem('refresh_token');
                if (refresh) {
                    try {
                        const refreshRes = await fetch(`${API_BASE}/auth/refresh/`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh })
                        });
                        if (refreshRes.ok) {
                            const data = await refreshRes.json();
                            setToken(data.access, null); // guardamos el nuevo
                            // reintentar el request original
                            options.headers['Authorization'] = `Bearer ${data.access}`;
                            return fetch(url, options);
                        }
                    } catch (e) {
                        console.error('Error refrescando token', e);
                    }
                }
                logout(); // Si no se pudo refrescar, salir
            }

            return response;
        }

        // Cargar datos de usuario al iniciar
        async function loadUserInfo() {
            // Ignorar en la página de login
            if (window.location.pathname === '/login/') return;
            
            if (!getToken()) {
                logout();
                return;
            }

            try {
                const res = await fetchWithAuth(`${API_BASE}/auth/me/`);
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('rol', data.rol);
                    const rolDisplay = document.getElementById('userRolDisplay');
                    if (rolDisplay) {
                        let roleClass = 'role-badge-analista';
                        if (data.rol === 'medico') roleClass = 'role-badge-medico';
                        if (data.rol === 'administrador') roleClass = 'role-badge-admin';
                        
                        rolDisplay.innerHTML = `
                            <span class="role-badge ${roleClass}">
                                ${data.rol.charAt(0).toUpperCase() + data.rol.slice(1)}
                            </span>
                            <span class="ms-2">${data.username}</span>
                        `;
                    }

                    // Hide links based on role
                    const links = document.querySelectorAll('.nav-link');
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (data.rol === 'medico') {
                            if (href === '/etl/' || href === '/ml/' || href === '/reportes/' || href === '/usuarios/') {
                                link.parentElement.style.display = 'none';
                            }
                        } else if (data.rol === 'analista') {
                            if (href === '/usuarios/' || href === '/ml/' || href === '/pacientes/') {
                                link.parentElement.style.display = 'none';
                            }
                        }
                    });

                } else {
                    logout();
                }
            } catch (error) {
                console.error("Error loading user info", error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadUserInfo);
    </script>
    {% block extra_js %}{% endblock extra_js %}
</body>
</html>
