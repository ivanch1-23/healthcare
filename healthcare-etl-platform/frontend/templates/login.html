{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Healthcare Platform</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="login-bg">
    <div class="login-card text-center">
        <div class="login-icon">⚕️</div>
        <h3 class="mb-4 fw-bold">Iniciar Sesión</h3>
        <div id="errorAlert" class="alert alert-danger d-none"></div>
        <form id="loginForm" class="text-start">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" id="username" class="form-control form-control-custom" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control form-control-custom" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2">Ingresar</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alert = document.getElementById('errorAlert');
            alert.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = '/';
                } else {
                    const error = await res.json();
                    alert.textContent = error.detail || 'Credenciales incorrectas';
                    alert.classList.remove('d-none');
                }
            } catch (err) {
                alert.textContent = 'Error de conexión con el servidor';
                alert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
