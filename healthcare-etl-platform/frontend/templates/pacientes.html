{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-12 mb-4">
        <h2>Pacientes Clínicos</h2>
        <p class="text-muted">Directorio maestro de pacientes procesados.</p>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-8">
        <form id="filterForm" class="row gx-2 gy-2 align-items-center">
            <div class="col-auto">
                <label class="visually-hidden" for="filterRiesgo">Riesgo</label>
                <select class="form-select" id="filterRiesgo">
                    <option value="">Cualquier Riesgo</option>
                    <option value="Bajo">Bajo</option>
                    <option value="Medio">Medio</option>
                    <option value="Alto">Alto</option>
                    <option value="Crítico">Crítico</option>
                </select>
            </div>
            <div class="col-auto">
                <label class="visually-hidden" for="filterSexo">Sexo</label>
                <select class="form-select" id="filterSexo">
                    <option value="">Cualquier Sexo</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary-custom">Filtrar</button>
            </div>
        </form>
    </div>
    <div class="col-md-4 text-end" id="exportContainer">
        <button class="btn btn-outline-secondary me-1 btn-export-csv" onclick="exportData('csv')">📄 Exportar CSV</button>
        <button class="btn btn-outline-success me-1 btn-export-excel" onclick="exportData('excel')">📊 Exportar Excel</button>
        <button class="btn btn-outline-danger btn-export-pdf" onclick="exportData('pdf')">📑 Exportar PDF</button>
    </div>
</div>

<!-- Table -->
<div class="row">
    <div class="col-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-custom align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Edad</th>
                                <th>Sexo</th>
                                <th>IMC</th>
                                <th>Glucosa</th>
                                <th>Presión (S/D)</th>
                                <th>Riesgo</th>
                            </tr>
                        </thead>
                        <tbody id="pacientesTableBody">
                            <tr><td colspan="8" class="text-center">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <nav aria-label="Navegación de páginas" class="mt-3">
                    <ul class="pagination justify-content-center" id="paginationControls">
                        <!-- Pagination buttons generated by JS -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPageUrl = `${API_BASE}/etl/pacientes/`;

    async function loadPacientes(url) {
        const tbody = document.getElementById('pacientesTableBody');
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">Cargando...</td></tr>';
        
        try {
            const res = await fetchWithAuth(url);
            if (res.ok) {
                const data = await res.json();
                tbody.innerHTML = '';
                
                if (data.results.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center">No se encontraron pacientes.</td></tr>';
                } else {
                    data.results.forEach(p => {
                        let badgeClass = 'badge-riesgo-bajo';
                        if (p.riesgo_enfermedad === 'Crítico') badgeClass = 'badge-riesgo-critico';
                        else if (p.riesgo_enfermedad === 'Alto') badgeClass = 'badge-riesgo-alto';
                        else if (p.riesgo_enfermedad === 'Medio') badgeClass = 'badge-riesgo-medio';

                        tbody.innerHTML += `
                            <tr>
                                <td>${p.id_paciente}</td>
                                <td>${p.nombres} ${p.apellidos}</td>
                                <td>${p.edad}</td>
                                <td>${p.sexo}</td>
                                <td>${p.IMC.toFixed(1)}</td>
                                <td>${p.glucosa}</td>
                                <td>${p.presion_sistolica}/${p.presion_diastolica}</td>
                                <td><span class="badge ${badgeClass}">${p.riesgo_enfermedad}</span></td>
                            </tr>
                        `;
                    });
                }
                
                renderPagination(data.previous, data.next);
                
            } else {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">Error cargando datos.</td></tr>';
            }
        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">Error de conexión.</td></tr>';
        }
    }

    function renderPagination(prev, next) {
        const pag = document.getElementById('paginationControls');
        pag.innerHTML = '';
        
        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${!prev ? 'disabled' : ''}`;
        prevLi.innerHTML = `<button class="page-link" onclick="loadPacientes('${prev}')">Anterior</button>`;
        pag.appendChild(prevLi);

        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${!next ? 'disabled' : ''}`;
        nextLi.innerHTML = `<button class="page-link" onclick="loadPacientes('${next}')">Siguiente</button>`;
        pag.appendChild(nextLi);
    }

    document.getElementById('filterForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const riesgo = document.getElementById('filterRiesgo').value;
        const sexo = document.getElementById('filterSexo').value;
        
        const params = new URLSearchParams();
        if (riesgo) params.append('riesgo', riesgo);
        if (sexo) params.append('sexo', sexo);
        
        const url = `${API_BASE}/etl/pacientes/?${params.toString()}`;
        loadPacientes(url);
    });

    document.addEventListener('DOMContentLoaded', () => {
        const rol = localStorage.getItem('rol');
        if (rol === 'medico') {
            const exportContainer = document.getElementById('exportContainer');
            if (exportContainer) exportContainer.style.display = 'none';
        }
        loadPacientes(currentPageUrl);
    });

    async function exportData(formato) {
        const url = `${API_BASE}/reportes/exportar/?formato=${formato}`;
        try {
            const token = localStorage.getItem('access_token');
            const res = await fetch(url, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            if (res.ok) {
                const blob = await res.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `pacientes_export.${formato}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);
            } else {
                alert('Error al exportar los datos.');
            }
        } catch (error) {
            console.error('Export error:', error);
            alert('Error de conexión al exportar.');
        }
    }
</script>
{% endblock %}
