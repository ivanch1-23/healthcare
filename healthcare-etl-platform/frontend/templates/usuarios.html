{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-12 mb-4">
        <h2>Gestión de Usuarios</h2>
        <p class="text-muted">Panel de administración para roles y accesos.</p>
    </div>
</div>

<div class="row">
    <div class="col-12 text-end mb-3">
        <button class="btn btn-primary" onclick="showUserModal()">+ Nuevo Usuario</button>
    </div>
    <div class="col-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Rol</th>
                                <th>Activo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuariosBody">
                            <tr><td colspan="5" class="text-center">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="userForm" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="userModalTitle">Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="userId">
        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Password (dejar en blanco para no cambiar)</label>
            <input type="password" id="password" class="form-control">
        </div>
        <div class="mb-3">
            <label>Rol</label>
            <select id="rol" class="form-select" required>
                <option value="administrador">Administrador</option>
                <option value="medico">Médico</option>
                <option value="analista">Analista</option>
            </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const userModal = new bootstrap.Modal(document.getElementById('userModal'));

    async function loadUsuarios() {
        try {
            const res = await fetchWithAuth(`${API_BASE}/auth/usuarios/`);
            if (res.ok) {
                const users = await res.json();
                const tbody = document.getElementById('usuariosBody');
                tbody.innerHTML = '';
                users.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.rol}</td>
                            <td>${u.is_active ? 'Sí' : 'No'}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" onclick="editUser(${u.id}, '${u.username}', '${u.rol}')">Editar</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                document.getElementById('usuariosBody').innerHTML = '<tr><td colspan="5" class="text-danger text-center">Acceso denegado o error.</td></tr>';
            }
        } catch (e) {
            console.error(e);
        }
    }

    function showUserModal() {
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('userModalTitle').textContent = 'Nuevo Usuario';
        document.getElementById('password').required = true;
        userModal.show();
    }

    function editUser(id, username, rol) {
        document.getElementById('userId').value = id;
        document.getElementById('username').value = username;
        document.getElementById('rol').value = rol;
        document.getElementById('password').required = false;
        document.getElementById('password').value = '';
        document.getElementById('userModalTitle').textContent = 'Editar Usuario';
        userModal.show();
    }

    async function deleteUser(id) {
        if (!confirm('¿Seguro que deseas eliminar este usuario?')) return;
        const res = await fetchWithAuth(`${API_BASE}/auth/usuarios/${id}/`, { method: 'DELETE' });
        if (res.ok) loadUsuarios();
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('userId').value;
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_BASE}/auth/usuarios/${id}/` : `${API_BASE}/auth/usuarios/`;
        const body = {
            username: document.getElementById('username').value,
            rol: document.getElementById('rol').value
        };
        const pass = document.getElementById('password').value;
        if (pass) body.password = pass;

        const res = await fetchWithAuth(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            userModal.hide();
            loadUsuarios();
        } else {
            alert('Error guardando usuario');
        }
    });

    document.addEventListener('DOMContentLoaded', loadUsuarios);
</script>
{% endblock %}
